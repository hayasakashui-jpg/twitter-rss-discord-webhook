name: Fetch Tweets
on:
  schedule:
    - cron: '*/15 * * * *' # 每 15 分鐘自動執行一次
  workflow_dispatch: # 允許您在網頁手動點擊執行

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Webhook Script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TWITTER_USER: ${{ secrets.TWITTER_USER }}
        run: node index.js
